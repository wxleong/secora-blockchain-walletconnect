name:
  CI
on:
  [push, pull_request]
jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Build projects
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
          DOCKER_IMAGE: gradle:7.6.0-jdk11
        run: |
          .github/docker/launcher.sh
        shell: bash
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-apks
          path: |
            walletconnect-v1.0/app-secora/build/outputs/apk/release/*.apk
            walletconnect-v2.0/app-secora/build/outputs/apk/release/*.apk
  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: android-apks
          path: apks-collection
      - name: Changelog Pruning
        run: |
          sed -n `awk '/## \[[x0-9]/{c++} c==1{ print NR; exit }' CHANGELOG.md`',$p' CHANGELOG.md > .CHANGELOG.md.tmp
          sed `awk '/## \[[x0-9]/{c++} c==2{ print NR; exit }' .CHANGELOG.md.tmp`',$d' .CHANGELOG.md.tmp > ${{ github.workspace }}-CHANGELOG.txt
      - name: Create release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: ${{ github.workspace }}-CHANGELOG.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          files: |
            LICENSE
            apks-collection/*
